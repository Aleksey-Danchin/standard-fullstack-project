# @scaffold-config — scaffold infra/scripts/env. Change project name, domains, and env only. See SCAFFOLD.md
#
# Dev persistence for session data (AOF + RDB). Data dir is mounted at /data in compose.

dir /data

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# AOF — survives container restarts (appendfsync everysec: small loss window on crash)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

stop-writes-on-bgsave-error yes
