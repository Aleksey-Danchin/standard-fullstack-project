name: xxyyzz-test

services:
  postgres-test:
    container_name: xxyyzz-postgres-test
    image: postgres:18.3
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xxyyzz}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - xxyyzz-test-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-xxyyzz}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend-test:
    container_name: xxyyzz-backend-test
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend.dev
    volumes:
      - ../../apps:/apps
    working_dir: /apps/backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-test:5432/${POSTGRES_DB:-xxyyzz}
      - PORT=3000
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN:-xxyyzz.localhost}
    networks:
      - xxyyzz-test-net
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-test.rule=Host(`xxyyzz.localhost`) && PathPrefix(`/api`)
      - traefik.http.routers.backend-test.entrypoints=websecure
      - traefik.http.routers.backend-test.tls=true
      - traefik.http.routers.backend-test.priority=100
      - traefik.http.services.backend-test.loadbalancer.server.port=3000

  frontend-test:
    container_name: xxyyzz-frontend-test
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend.dev
    command: npm run dev -- --host
    volumes:
      - ../../apps:/apps
    working_dir: /apps/frontend
    networks:
      - xxyyzz-test-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-test.rule=Host(`xxyyzz.localhost`)
      - traefik.http.routers.frontend-test.entrypoints=websecure
      - traefik.http.routers.frontend-test.tls=true
      - traefik.http.routers.frontend-test.priority=1
      - traefik.http.services.frontend-test.loadbalancer.server.port=5173

  studio-test:
    container_name: xxyyzz-prisma-studio-test
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.studio.dev
    command: sh -c "sleep infinity"
    volumes:
      - ../../apps:/apps
    working_dir: /apps/prisma
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-test:5432/${POSTGRES_DB:-xxyyzz}
    networks:
      - xxyyzz-test-net
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "npx prisma -v >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - traefik.enable=false

  traefik-test:
    container_name: xxyyzz-traefik-test
    image: traefik:v3
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../infra/traefik/traefik.test.yml:/etc/traefik/traefik.yml:ro
      - ../../infra/traefik/dynamic:/etc/traefik/dynamic:ro
      - ${MKCERT_CAROOT:-${HOME}/.local/share/mkcert}/xxyyzz:/certs:ro
    networks:
      - xxyyzz-test-net
    depends_on:
      backend-test:
        condition: service_healthy
      frontend-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8082/ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  xxyyzz-test-net:
    name: xxyyzz-test-net
